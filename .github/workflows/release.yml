name: Build on Master

on:
  push:
    branches:
      - master

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
            artifact_name: yaml.so
            output_path: target/release/libpawn_yaml.so
          - os: windows-latest
            target: i686-pc-windows-msvc
            artifact_name: yaml.dll
            output_path: target/release/pawn_yaml.dll

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y libc6:i386 libstdc++6:i386 gcc-multilib g++-multilib

      - name: Install Rust toolchain
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            rustup toolchain install stable-${{ matrix.target }} --force-non-host
          else
            rustup toolchain install stable-${{ matrix.target }}
          fi
          rustup default stable-${{ matrix.target }}

      - name: Build Crate
        run: cargo build --release

      - name: Prepare Artifact
        shell: bash
        run: |
          mkdir -p dist
          cp ${{ matrix.output_path }} dist/${{ matrix.artifact_name }}

      - name: Upload Artifact to Workflow
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}