name: Build on Master

on:
  push:
    branches:
      - master

jobs:
  build-linux:
    name: Build for Linux (i686)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build in 32-bit Docker container
        run: |
          docker run --rm --platform linux/386 -v ${{ github.workspace }}:/work -w /work i386/ubuntu:22.04 bash -c "
            apt-get update &&
            apt-get install -y curl git build-essential &&
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable &&
            . \$HOME/.cargo/env &&
            cargo build --release &&
            mkdir -p dist &&
            cp target/release/libpawn_yaml.so dist/yaml.so &&
            chmod -R 777 dist
          "

      - name: Upload Artifact to Workflow
        uses: actions/upload-artifact@v4
        with:
          name: yaml.so
          path: dist/yaml.so

  build-windows:
    name: Build for Windows (i686)
    runs-on: windows-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install Rust 32-bit toolchain
        shell: bash
        run: |
          rustup toolchain install stable-i686-pc-windows-msvc --force-non-host
          rustup default stable-i686-pc-windows-msvc

      - name: Build Crate
        run: cargo build --release

      - name: Prepare Artifact
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/pawn_yaml.dll dist/yaml.dll

      - name: Upload Artifact to Workflow
        uses: actions/upload-artifact@v4
        with:
          name: yaml.dll
          path: dist/yaml.dll