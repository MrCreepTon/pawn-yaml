name: Build on Master

on:
  push:
    branches:
      - master

jobs:
  # Linux
  build-linux:
    name: Build for Linux (i686)
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04
      options: --platform linux/386
    steps:
      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y curl git build-essential

      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build Crate
        run: |
          . $HOME/.cargo/env
          cargo build --release

      - name: Prepare Artifact
        run: |
          mkdir -p dist
          cp target/release/libpawn_yaml.so dist/yaml.so

      - name: Upload Artifact to Workflow
        uses: actions/upload-artifact@v4
        with:
          name: yaml.so
          path: dist/yaml.so

  # Windows
  build-windows:
    name: Build for Windows (i686)
    runs-on: windows-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install Rust 32-bit toolchain
        shell: bash
        run: |
          rustup toolchain install stable-i686-pc-windows-msvc --force-non-host
          rustup default stable-i686-pc-windows-msvc

      - name: Build Crate
        run: cargo build --release

      - name: Prepare Artifact
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/pawn_yaml.dll dist/yaml.dll

      - name: Upload Artifact to Workflow
        uses: actions/upload-artifact@v4
        with:
          name: yaml.dll
          path: dist/yaml.dll