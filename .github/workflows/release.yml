name: Build on Master

on:
  push:
    branches:
      - master

jobs:
  build-linux:
    name: Build for Linux (i686)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install 32-bit compiler libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: i686-unknown-linux-gnu

      - name: Build
        run: cargo build --target i686-unknown-linux-gnu --release

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp target/i686-unknown-linux-gnu/release/libpawn_yaml.so dist/yaml.so

      - name: Upload Artifact to Workflow
        uses: actions/upload-artifact@v4
        with:
          name: yaml.so
          path: dist/yaml.so

  build-windows:
    name: Build for Windows (i686)
    runs-on: windows-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: i686-pc-windows-msvc

      - name: Build Crate
        run: cargo build --target i686-pc-windows-msvc --release

      - name: Prepare Artifact
        shell: bash
        run: |
          mkdir -p dist
          cp target/i686-pc-windows-msvc/release/pawn_yaml.dll dist/yaml.dll

      - name: Upload Artifact to Workflow
        uses: actions/upload-artifact@v4
        with:
          name: yaml.dll
          path: dist/yaml.dll